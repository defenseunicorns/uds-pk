before:
  hooks:
    - go mod tidy

# Build a universal macOS binary
universal_binaries:
  - replace: false

# Build the different combination of goos/arch binaries
builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/defenseunicorns/uds-pk/src/cmd.CLIVersion={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: uds-pk

# Save the built artifacts as binaries (instead of wrapping them in a tarball)
archives:
  - format: binary
    name_template: "uds-pk_{{ .Tag }}_{{- title .Os }}_{{ .Arch }}"

# generate a sha256 checksum of all release artifacts
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# generate sboms for each binary artifact
sboms:
  - artifacts: binary
    documents:
      - "sbom_uds-pk_{{ .Tag }}_{{- title .Os }}_{{ .Arch }}.sbom"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

# Use the auto-generated changelog github provides
changelog:
  use: github-native

# Generate a GitHub release and publish the release for the tag
release:
  github:
    owner: defenseunicorns-dashdays
    name: 2026-03-stig-attest
  prerelease: auto
  mode: append
  draft: false
